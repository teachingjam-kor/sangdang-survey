<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상당초 수합 응답</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#2D6A4F;--green-l:#E8F5EE;--red:#E76F51;
  --bg:#F5F3EE;--surface:#fff;--border:#DDD9D0;--text:#1A1916;--muted:#7A7670;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:40px}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.09)}
.form-header{background:var(--green);color:#fff;padding:28px 28px 22px}
.form-header h1{font-size:18px;font-weight:700;margin-bottom:6px}
.form-header p{font-size:13px;opacity:.82;line-height:1.5}
.form-body{padding:24px 28px}
.deadline{display:inline-flex;align-items:center;gap:5px;font-size:12px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:99px;margin-top:10px}
/* 선생님 선택 */
.teacher-select-wrap{margin-bottom:20px}
.teacher-select-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:block}
.inp{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--green)}
/* 질문 */
.q-block{margin-bottom:22px}
.q-label{font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.5}
.req{color:var(--red);margin-left:3px}
/* 선택지 커스텀 UI */
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:7px;transition:all .15s;font-size:14px;user-select:none}
.option:hover{border-color:var(--green);background:var(--green-l)}
.option.checked{border-color:var(--green);background:var(--green-l)}
.radio-opt.checked{border-color:var(--blue);background:var(--blue-l);}
.radio-opt:hover{border-color:var(--blue);background:var(--blue-l);}
.check-opt.checked{border-color:var(--amber);background:var(--amber-l);}
.check-opt:hover{border-color:var(--amber);background:var(--amber-l);}
/* 라디오 원 */
.radio-circle{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.radio-circle.filled{border-color:var(--blue);background:var(--blue)}
.radio-circle.filled::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
/* 체크박스 박스 */
.check-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.check-box.ticked{border-color:var(--amber);background:var(--amber)}
.check-box.ticked::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;min-height:90px;transition:border-color .15s}
.textarea:focus{outline:none;border-color:var(--green)}
.file-drop{border:2px dashed var(--border);border-radius:8px;padding:22px;text-align:center;cursor:pointer;transition:all .15s;font-size:13px;color:var(--muted)}
.file-drop:hover,.file-drop.over{border-color:var(--green);background:var(--green-l);color:var(--green)}
.file-name{font-size:12px;color:var(--green);margin-top:6px;display:none}
/* 제출 버튼 */
.submit-btn{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:6px}
.submit-btn:hover{background:#235c41}
.submit-btn:disabled{background:#aaa;cursor:not-allowed}
/* 완료 화면 */
.done-screen{text-align:center;padding:40px 28px}
.done-icon{font-size:48px;margin-bottom:16px}
.done-title{font-size:20px;font-weight:700;margin-bottom:8px}
.done-msg{font-size:14px;color:var(--muted);line-height:1.7}
/* 에러 */
.error-screen{text-align:center;padding:40px 28px;color:var(--muted)}
/* 이미 제출 */
.already{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;font-size:13px;color:#92400e;margin-bottom:18px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="form-card" id="form-card">
    <div style="text-align:center;padding:60px 28px;color:var(--muted)">불러오는 중...</div>
  </div>
</div>

<script>
const SURL='https://wbieiiovycgxelxwuqrg.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiaWVpaW92eWNneGVseHd1cXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjg2MzgsImV4cCI6MjA4ODk0NDYzOH0.iB4sx9Ubdwh3T8yH0VmKdENY0lQQRcbux1pMvplScjM';
const sb=supabase.createClient(SURL,SKEY);

const params=new URLSearchParams(location.search);
const sid=parseInt(params.get('sid'));

let survey=null, targets=[], teachers=[], answers={}, selectedTeacher=null, files={};

async function init(){
  if(!sid){showError('올바른 수합 링크가 아닙니다.');return;}
  const [{data:sv},{data:tg},{data:tc}]=await Promise.all([
    sb.from('surveys').select('*').eq('id',sid).single(),
    sb.from('targets').select('teacher_id').eq('survey_id',sid),
    sb.from('teachers').select('*').eq('status','active').order('name'),
  ]);
  if(!sv){showError('수합을 찾을 수 없습니다.');return;}
  survey=sv;
  const tids=new Set((tg||[]).map(r=>r.teacher_id));
  teachers=(tc||[]).filter(t=>tids.has(t.id));
  renderForm();
}

function renderForm(){
  const qs=survey.questions||[];
  document.getElementById('form-card').innerHTML=`
    <div class="form-header">
      <h1>${survey.title}</h1>
      ${survey.description?`<p>${survey.description}</p>`:''}
      ${survey.deadline?`<div class="deadline">📅 마감 ${survey.deadline}</div>`:''}
    </div>
    <div class="form-body">
      <div class="teacher-select-wrap">
        <label class="teacher-select-label">본인 이름 선택 *</label>
        <select class="inp" id="teacher-sel" onchange="onSelectTeacher(this.value)">
          <option value="">이름을 선택하세요</option>
          ${teachers.map(t=>`<option value="${t.id}">${t.name}${t.note?' ('+t.note+')':''}</option>`).join('')}
        </select>
      </div>
      <div id="already-msg" class="already" style="display:none">이미 응답하셨습니다. 수정 후 다시 제출하면 덮어쓰기됩니다.</div>
      <div id="q-area">
        ${qs.map((q,i)=>renderQ(q,i)).join('')}
      </div>
      <button class="submit-btn" onclick="submitForm()" id="sub-btn">제출하기</button>
    </div>`;
}

function renderQ(q,i){
  const label=`<div class="q-label">${i+1}. ${q.text}<span class="req">*</span></div>`;
  if(q.type==='short') return `<div class="q-block">${label}<input class="inp" id="q-${q.id}" placeholder="답변을 입력하세요"></div>`;
  if(q.type==='long')  return `<div class="q-block">${label}<textarea class="textarea" id="q-${q.id}" placeholder="답변을 입력하세요"></textarea></div>`;
  if(q.type==='file')  return `<div class="q-block">${label}
    <div class="file-drop" id="fd-${q.id}" onclick="document.getElementById('fi-${q.id}').click()">
      📎 파일을 클릭하거나 드래그해서 첨부
      <div class="file-name" id="fn-${q.id}"></div>
    </div>
    <input type="file" id="fi-${q.id}" style="display:none" onchange="onFile('${q.id}',this)">
  </div>`;
  if(q.type==='radio') return `<div class="q-block">
    ${label}
    <div style="font-size:11px;color:var(--blue);margin-bottom:8px;font-weight:500">● 하나만 선택하세요</div>
    ${(q.options||[]).map(o=>`
    <label class="option radio-opt" id="opt-${q.id}-${encodeOpt(o)}" onclick="selectRadio('${q.id}','${o.replace(/'/g,"\\'")}')">
      <span class="radio-circle" id="rc-${q.id}-${encodeOpt(o)}"></span>
      <span>${o}</span>
    </label>`).join('')}
  </div>`;
  if(q.type==='check') return `<div class="q-block">
    ${label}
    <div style="font-size:11px;color:var(--amber);margin-bottom:8px;font-weight:500">☑ 해당하는 것을 모두 선택하세요</div>
    ${(q.options||[]).map(o=>`
    <label class="option check-opt" id="opt-${q.id}-${encodeOpt(o)}" onclick="toggleCheckOpt('${q.id}','${o.replace(/'/g,"\\'")}')">
      <span class="check-box" id="cb-${q.id}-${encodeOpt(o)}"></span>
      <span>${o}</span>
    </label>`).join('')}
  </div>`;
  return '';
}
function encodeOpt(s){return btoa(encodeURIComponent(s)).replace(/[^a-zA-Z0-9]/g,'').slice(0,12);}
function selectRadio(qid,val){
  answers[qid]=val;
  document.querySelectorAll(`[id^="opt-${qid}-"]`).forEach(el=>{
    el.classList.remove('checked');
    const rc=el.querySelector('.radio-circle');
    if(rc) rc.classList.remove('filled');
  });
  const key=`opt-${qid}-${encodeOpt(val)}`;
  const el=document.getElementById(key);
  if(el){
    el.classList.add('checked');
    const rc=el.querySelector('.radio-circle');
    if(rc) rc.classList.add('filled');
  }
}
function toggleCheckOpt(qid,val){
  if(!answers[qid])answers[qid]=[];
  const idx=answers[qid].indexOf(val);
  const checked=idx===-1;
  if(checked) answers[qid].push(val);
  else answers[qid].splice(idx,1);
  const key=`opt-${qid}-${encodeOpt(val)}`;
  const el=document.getElementById(key);
  if(el){
    el.classList.toggle('checked',checked);
    const cb=el.querySelector('.check-box');
    if(cb) cb.classList.toggle('ticked',checked);
  }
}
function toggleCheck(qid,val,checked){
  if(!answers[qid])answers[qid]=[];
  if(checked){if(!answers[qid].includes(val))answers[qid].push(val);}
  else{answers[qid]=answers[qid].filter(v=>v!==val);}
}
function onFile(qid,input){
  if(input.files[0]){
    files[qid]=input.files[0];
    const fn=document.getElementById(`fn-${qid}`);
    fn.textContent='📎 '+input.files[0].name;fn.style.display='block';
  }
}

async function onSelectTeacher(tid){
  selectedTeacher=parseInt(tid)||null;
  if(!selectedTeacher)return;
  const{data}=await sb.from('responses').select('answers,submitted_at').eq('survey_id',sid).eq('teacher_id',selectedTeacher).maybeSingle();
  if(data){
    document.getElementById('already-msg').style.display='block';
    // 기존 답변 채워넣기
    const a=data.answers||{};
    Object.keys(a).forEach(qid=>{
      const q=survey.questions.find(x=>String(x.id)===qid);
      if(!q)return;
      if(q.type==='short'||q.type==='long'){
        const el=document.getElementById('q-'+qid);
        if(el)el.value=a[qid];
      } else if(q.type==='radio'){
        selectRadio(qid,a[qid]);
      } else if(q.type==='check'){
        (a[qid]||[]).forEach(v=>toggleCheckOpt(qid,v));
      }
      answers[qid]=a[qid];
    });
  } else {
    document.getElementById('already-msg').style.display='none';
  }
}

async function submitForm(){
  if(!selectedTeacher){alert('이름을 선택해주세요.');return;}
  const qs=survey.questions||[];
  // 답변 수집
  const finalAnswers={};
  for(const q of qs){
    const key=String(q.id);
    if(q.type==='short'||q.type==='long'){
      finalAnswers[key]=document.getElementById('q-'+q.id)?.value||'';
    } else if(q.type==='radio'||q.type==='check'){
      finalAnswers[key]=answers[String(q.id)]||answers[q.id]||'';
    } else if(q.type==='file'){
      finalAnswers[key]=files[String(q.id)]?.name||files[q.id]?.name||answers[String(q.id)]||'';
    }
  }
  const btn=document.getElementById('sub-btn');
  btn.innerHTML='<span class="spinner"></span> 제출 중...';btn.disabled=true;
  try{
    // upsert: 이미 있으면 업데이트, 없으면 insert
    const{error}=await sb.from('responses').upsert({
      survey_id:sid,
      teacher_id:selectedTeacher,
      answers:finalAnswers,
      submitted_at:new Date().toISOString(),
    },{onConflict:'survey_id,teacher_id'});
    if(error)throw error;
    // 파일 업로드
    for(const [qid,file] of Object.entries(files)){
      const safeName=file.name.replace(/\s+/g,'_');
      const path=`${sid}/${selectedTeacher}/${String(qid)}_${safeName}`;
      const{error:fe}=await sb.storage.from('attachments').upload(path,file,{upsert:true});
      if(fe)console.warn('파일 업로드 실패:',fe.message);
      // answers에도 안전한 파일명으로 업데이트
      finalAnswers[String(qid)]=safeName;
    }
    showDone();
  }catch(err){
    btn.innerHTML='제출하기';btn.disabled=false;
    alert('제출 실패: '+err.message);
  }
}

function showDone(){
  const t=teachers.find(x=>x.id===selectedTeacher);
  document.getElementById('form-card').innerHTML=`
    <div class="done-screen">
      <div class="done-icon">✅</div>
      <div class="done-title">${t?t.name+' 선생님,':''}제출 완료!</div>
      <div class="done-msg">'${survey.title}'에 응답해 주셔서 감사합니다.<br>이 창을 닫으셔도 됩니다.</div>
    </div>`;
}

function showError(msg){
  document.getElementById('form-card').innerHTML=`
    <div class="error-screen"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-weight:600;margin-bottom:6px">오류</div><div>${msg}</div></div>`;
}

init();
</script>
</body>
</html>
